<!-- @dsCard group="Components" viewport="700x520" name="Forms — Input, Select, Checkbox, Toggle" subtitle="Text/currency fields, dropdowns, checkboxes, toggles" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-body);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Toggle } = window.LoanStarDesignSystem_9cf112;

function Demo() {
  const [remember, setRemember] = React.useState(true);
  const [reminders, setReminders] = React.useState(true);
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <Input label="Full Name" required placeholder="e.g. Juan dela Cruz" helper="As it appears on your government ID" />
        <Input label="Loan Amount" prefix="₱" defaultValue="150,000" />
        <Input label="Date of Birth" required defaultValue="01/01/2010" error="Applicant must be at least 18 years old" />
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <Select label="Loan Purpose"><option>Business Capital</option><option>Home Improvement</option><option>Education</option></Select>
        <Checkbox label="I agree to the Loan Terms and Conditions" checked={remember} onChange={setRemember} />
        <Checkbox label="Disabled option" checked={false} disabled />
        <Toggle checked={reminders} onChange={setReminders} label="Payment Reminders" sub="SMS before due date" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
