<!-- @dsCard group="Spacing" viewport="700x180" name="Border Radius" subtitle="Softer corners — Deep Harbor's rounder card language" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;gap:20px;}
.item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.box{border:2px solid var(--color-primary-600);background:#fff;}
.name{font-size:11px;font-weight:600;color:var(--color-neutral-700);}
.use{font-size:10px;color:var(--color-neutral-400);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="width:56px;height:40px;border-radius:4px;"></div><div class="name">xs · 4px</div><div class="use">badges</div></div>
  <div class="item"><div class="box" style="width:56px;height:40px;border-radius:6px;"></div><div class="name">sm · 6px</div><div class="use">buttons, inputs</div></div>
  <div class="item"><div class="box" style="width:56px;height:40px;border-radius:12px;"></div><div class="name">md · 12px</div><div class="use">cards, modals</div></div>
  <div class="item"><div class="box" style="width:56px;height:40px;border-radius:20px;"></div><div class="name">lg · 20px</div><div class="use">feature cards, hero-to-tray</div></div>
  <div class="item"><div class="box" style="width:56px;height:28px;border-radius:9999px;"></div><div class="name">full</div><div class="use">pills, avatars</div></div>
</div>
</body></html>
