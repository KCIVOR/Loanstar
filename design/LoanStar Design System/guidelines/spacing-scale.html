<!-- @dsCard group="Spacing" viewport="700x260" name="Spacing Scale" subtitle="4px base unit — space-1 … space-16" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;display:flex;flex-direction:column;gap:11px;}
.row{display:flex;align-items:center;gap:14px;}
.tag{width:80px;text-align:right;font-size:11px;font-weight:700;color:var(--color-neutral-400);font-family:var(--font-mono);flex-shrink:0;}
.bar{height:18px;background:var(--color-primary-600);border-radius:2px;flex-shrink:0;}
.use{font-size:12px;color:var(--color-neutral-500);}
</style></head>
<body>
<div class="row"><div class="tag">--space-1</div><div class="bar" style="width:4px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">4px</strong> — icon gap, micro spacing</div></div>
<div class="row"><div class="tag">--space-2</div><div class="bar" style="width:8px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">8px</strong> — label-to-field gap</div></div>
<div class="row"><div class="tag">--space-4</div><div class="bar" style="width:16px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">16px</strong> — button/input padding</div></div>
<div class="row"><div class="tag">--space-6</div><div class="bar" style="width:24px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">24px</strong> — card padding</div></div>
<div class="row"><div class="tag">--space-8</div><div class="bar" style="width:32px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">32px</strong> — section inner padding</div></div>
<div class="row"><div class="tag">--space-12</div><div class="bar" style="width:48px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">48px</strong> — page padding horizontal</div></div>
<div class="row"><div class="tag">--space-16</div><div class="bar" style="width:64px;"></div><div class="use"><strong style="color:var(--color-neutral-700);">64px</strong> — section vertical spacing</div></div>
</body></html>
