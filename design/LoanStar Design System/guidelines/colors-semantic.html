<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Success, Warning, Danger, Info" subtitle="Approved/paid, due/pending, rejected/overdue, tips" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.card{border:1px solid var(--color-neutral-200);border-radius:6px;overflow:hidden;}
.bar{height:48px;}
.body{padding:10px 12px;}
.name{font-size:12px;font-weight:700;color:var(--color-neutral-900);}
.val{font-size:10px;color:var(--color-neutral-400);font-family:var(--font-mono);margin-bottom:4px;}
.use{font-size:11px;color:var(--color-neutral-500);line-height:1.4;}
</style></head>
<body>
<div class="grid">
  <div class="card"><div class="bar" style="background:#3E8E3C"></div><div class="body"><div class="name">Success</div><div class="val">#3E8E3C</div><div class="use">Approved, paid, verified</div></div></div>
  <div class="card"><div class="bar" style="background:#D97706"></div><div class="body"><div class="name">Warning</div><div class="val">#D97706</div><div class="use">Due dates, pending review</div></div></div>
  <div class="card"><div class="bar" style="background:#C24638"></div><div class="body"><div class="name">Danger</div><div class="val">#C24638</div><div class="use">Rejected, overdue, errors</div></div></div>
  <div class="card"><div class="bar" style="background:#0EA5E9"></div><div class="body"><div class="name">Info</div><div class="val">#0EA5E9</div><div class="use">Tips, notifications</div></div></div>
</div>
</body></html>
