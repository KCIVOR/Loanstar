<!-- @dsCard group="Colors" viewport="700x160" name="Neutral — Navy-tinted" subtitle="UI scaffolding scale, 50→900" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;gap:4px;}
.sw{flex:1;}
.sw .swatch{height:52px;border-radius:4px 4px 0 0;}
.sw .meta{background:#fff;border:1px solid var(--color-neutral-200);border-top:none;border-radius:0 0 4px 4px;padding:7px 8px;}
.sw .name{font-size:10px;font-weight:700;color:var(--color-neutral-600);}
.sw .val{font-size:9px;color:var(--color-neutral-400);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#F3F5FA;border:1px solid #DFE5F0"></div><div class="meta"><div class="name">50</div><div class="val">#F3F5FA</div></div></div>
  <div class="sw"><div class="swatch" style="background:#E8EDF7;border:1px solid #DFE5F0"></div><div class="meta"><div class="name">100</div><div class="val">#E8EDF7</div></div></div>
  <div class="sw"><div class="swatch" style="background:#DFE5F0"></div><div class="meta"><div class="name">200</div><div class="val">#DFE5F0</div></div></div>
  <div class="sw"><div class="swatch" style="background:#C3CCDE"></div><div class="meta"><div class="name">300</div><div class="val">#C3CCDE</div></div></div>
  <div class="sw"><div class="swatch" style="background:#8B99BC"></div><div class="meta"><div class="name">400</div><div class="val">#8B99BC</div></div></div>
  <div class="sw"><div class="swatch" style="background:#64708C"></div><div class="meta"><div class="name">500</div><div class="val">#64708C</div></div></div>
  <div class="sw"><div class="swatch" style="background:#4F5A78"></div><div class="meta"><div class="name">600</div><div class="val">#4F5A78</div></div></div>
  <div class="sw"><div class="swatch" style="background:#3D4A68"></div><div class="meta"><div class="name">700</div><div class="val">#3D4A68</div></div></div>
  <div class="sw"><div class="swatch" style="background:#232F4C"></div><div class="meta"><div class="name">800</div><div class="val">#232F4C</div></div></div>
  <div class="sw"><div class="swatch" style="background:#16233F"></div><div class="meta"><div class="name">900</div><div class="val">#16233F</div></div></div>
</div>
</body></html>
