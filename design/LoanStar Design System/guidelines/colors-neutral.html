<!-- @dsCard group="Colors" viewport="700x160" name="Neutral — Slate" subtitle="UI scaffolding scale, 50→900" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;gap:4px;}
.sw{flex:1;}
.sw .swatch{height:52px;border-radius:4px 4px 0 0;}
.sw .meta{background:#fff;border:1px solid var(--color-neutral-200);border-top:none;border-radius:0 0 4px 4px;padding:7px 8px;}
.sw .name{font-size:10px;font-weight:700;color:var(--color-neutral-600);}
.sw .val{font-size:9px;color:var(--color-neutral-400);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#F8FAFC;border:1px solid #E2E8F0"></div><div class="meta"><div class="name">50</div><div class="val">#F8FAFC</div></div></div>
  <div class="sw"><div class="swatch" style="background:#F1F5F9;border:1px solid #E2E8F0"></div><div class="meta"><div class="name">100</div><div class="val">#F1F5F9</div></div></div>
  <div class="sw"><div class="swatch" style="background:#E2E8F0"></div><div class="meta"><div class="name">200</div><div class="val">#E2E8F0</div></div></div>
  <div class="sw"><div class="swatch" style="background:#CBD5E1"></div><div class="meta"><div class="name">300</div><div class="val">#CBD5E1</div></div></div>
  <div class="sw"><div class="swatch" style="background:#94A3B8"></div><div class="meta"><div class="name">400</div><div class="val">#94A3B8</div></div></div>
  <div class="sw"><div class="swatch" style="background:#64748B"></div><div class="meta"><div class="name">500</div><div class="val">#64748B</div></div></div>
  <div class="sw"><div class="swatch" style="background:#475569"></div><div class="meta"><div class="name">600</div><div class="val">#475569</div></div></div>
  <div class="sw"><div class="swatch" style="background:#334155"></div><div class="meta"><div class="name">700</div><div class="val">#334155</div></div></div>
  <div class="sw"><div class="swatch" style="background:#1E293B"></div><div class="meta"><div class="name">800</div><div class="val">#1E293B</div></div></div>
  <div class="sw"><div class="swatch" style="background:#0F172A"></div><div class="meta"><div class="name">900</div><div class="val">#0F172A</div></div></div>
</div>
</body></html>
