<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--color-neutral-100);}
.tag{width:74px;flex-shrink:0;text-align:right;font-size:10px;font-weight:700;color:var(--color-neutral-400);text-transform:uppercase;letter-spacing:0.06em;}
.spec{font-size:9px;color:var(--color-neutral-300);font-family:var(--font-mono);margin-top:2px;}
</style></head>
<body>
<div class="row"><div><div class="tag">H1</div><div class="spec">40/800/-1</div></div><div style="font-size:40px;font-weight:800;letter-spacing:-1px;color:var(--color-neutral-900);line-height:1.1;">Loan Application</div></div>
<div class="row"><div><div class="tag">H2</div><div class="spec">28/700/-.5</div></div><div style="font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--color-neutral-900);">Repayment Schedule</div></div>
<div class="row"><div><div class="tag">H3</div><div class="spec">22/600/-.3</div></div><div style="font-size:22px;font-weight:600;letter-spacing:-0.3px;color:var(--color-neutral-900);">Credit Investigation Summary</div></div>
<div class="row"><div><div class="tag">H4</div><div class="spec">18/600/-.2</div></div><div style="font-size:18px;font-weight:600;letter-spacing:-0.2px;color:var(--color-neutral-900);">Borrower Information</div></div>
<div class="row"><div><div class="tag">H5</div><div class="spec">15/600</div></div><div style="font-size:15px;font-weight:600;color:var(--color-neutral-900);">Document Checklist</div></div>
<div class="row" style="border-bottom:none;"><div><div class="tag">H6</div><div class="spec">12/700/+.08em</div></div><div style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-neutral-900);">Section Label</div></div>
</body></html>
