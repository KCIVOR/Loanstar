<!-- @dsCard group="Colors" viewport="700x160" name="Primary — Navy" subtitle="Deep Harbor brand navy scale, 50→900" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;gap:4px;}
.sw{flex:1;}
.sw .swatch{height:52px;border-radius:4px 4px 0 0;}
.sw .meta{background:#fff;border:1px solid var(--color-neutral-200);border-top:none;border-radius:0 0 4px 4px;padding:7px 8px;}
.sw .name{font-size:10px;font-weight:700;color:var(--color-neutral-600);}
.sw .val{font-size:9px;color:var(--color-neutral-400);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#F3F5FA;border:1px solid #E8EDF7"></div><div class="meta"><div class="name">50</div><div class="val">#F3F5FA</div></div></div>
  <div class="sw"><div class="swatch" style="background:#E8EDF7"></div><div class="meta"><div class="name">100</div><div class="val">#E8EDF7</div></div></div>
  <div class="sw"><div class="swatch" style="background:#C9D6EE"></div><div class="meta"><div class="name">200</div><div class="val">#C9D6EE</div></div></div>
  <div class="sw"><div class="swatch" style="background:#9FB0D8"></div><div class="meta"><div class="name">300</div><div class="val">#9FB0D8</div></div></div>
  <div class="sw"><div class="swatch" style="background:#7C97D8"></div><div class="meta"><div class="name">400</div><div class="val">#7C97D8</div></div></div>
  <div class="sw"><div class="swatch" style="background:#4C6FC0"></div><div class="meta"><div class="name">500</div><div class="val">#4C6FC0</div></div></div>
  <div class="sw" style="flex:1.4"><div class="swatch" style="background:#2F55B4;position:relative"><span style="position:absolute;top:6px;right:6px;background:#fff;color:#2F55B4;font-size:8px;font-weight:800;padding:2px 5px;border-radius:2px;">PRIMARY</span></div><div class="meta" style="background:#F3F5FA;border-color:#2F55B4"><div class="name" style="color:#2F55B4">600 ★</div><div class="val" style="color:#2F55B4">#2F55B4</div></div></div>
  <div class="sw"><div class="swatch" style="background:#22407F"></div><div class="meta"><div class="name">700</div><div class="val">#22407F</div></div></div>
  <div class="sw"><div class="swatch" style="background:#16233F"></div><div class="meta"><div class="name">800</div><div class="val">#16233F</div></div></div>
  <div class="sw"><div class="swatch" style="background:#0E1E4B"></div><div class="meta"><div class="name">900</div><div class="val">#0E1E4B</div></div></div>
</div>
</body></html>
