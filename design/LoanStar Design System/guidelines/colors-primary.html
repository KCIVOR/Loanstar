<!-- @dsCard group="Colors" viewport="700x160" name="Primary — Blue" subtitle="Brand blue scale, 50→900" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.row{display:flex;gap:4px;}
.sw{flex:1;}
.sw .swatch{height:52px;border-radius:4px 4px 0 0;}
.sw .meta{background:#fff;border:1px solid var(--color-neutral-200);border-top:none;border-radius:0 0 4px 4px;padding:7px 8px;}
.sw .name{font-size:10px;font-weight:700;color:var(--color-neutral-600);}
.sw .val{font-size:9px;color:var(--color-neutral-400);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:#EFF6FF;border:1px solid #DBEAFE"></div><div class="meta"><div class="name">50</div><div class="val">#EFF6FF</div></div></div>
  <div class="sw"><div class="swatch" style="background:#DBEAFE"></div><div class="meta"><div class="name">100</div><div class="val">#DBEAFE</div></div></div>
  <div class="sw"><div class="swatch" style="background:#BFDBFE"></div><div class="meta"><div class="name">200</div><div class="val">#BFDBFE</div></div></div>
  <div class="sw"><div class="swatch" style="background:#93C5FD"></div><div class="meta"><div class="name">300</div><div class="val">#93C5FD</div></div></div>
  <div class="sw"><div class="swatch" style="background:#60A5FA"></div><div class="meta"><div class="name">400</div><div class="val">#60A5FA</div></div></div>
  <div class="sw"><div class="swatch" style="background:#2563EB"></div><div class="meta"><div class="name">500</div><div class="val">#2563EB</div></div></div>
  <div class="sw" style="flex:1.4"><div class="swatch" style="background:#1A56DB;position:relative"><span style="position:absolute;top:6px;right:6px;background:#fff;color:#1A56DB;font-size:8px;font-weight:800;padding:2px 5px;border-radius:2px;">PRIMARY</span></div><div class="meta" style="background:#EFF6FF;border-color:#1A56DB"><div class="name" style="color:#1A56DB">600 ★</div><div class="val" style="color:#1A56DB">#1A56DB</div></div></div>
  <div class="sw"><div class="swatch" style="background:#1444B8"></div><div class="meta"><div class="name">700</div><div class="val">#1444B8</div></div></div>
  <div class="sw"><div class="swatch" style="background:#1E3A8A"></div><div class="meta"><div class="name">800</div><div class="val">#1E3A8A</div></div></div>
  <div class="sw"><div class="swatch" style="background:#1E2F5E"></div><div class="meta"><div class="name">900</div><div class="val">#1E2F5E</div></div></div>
</div>
</body></html>
