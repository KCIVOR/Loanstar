<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:#fff;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.card{background:#fff;border:1px solid var(--color-neutral-200);border-radius:6px;padding:16px;border-top:3px solid var(--accent);}
.n{font-size:12px;font-weight:700;color:var(--color-neutral-900);margin-bottom:6px;}
.d{font-size:11.5px;color:var(--color-neutral-500);line-height:1.55;}
</style></head>
<body>
<div class="grid">
  <div class="card" style="--accent:#0E1E4B"><div class="n">01 — Trustworthy</div><div class="d">Every element signals reliability. Consistent patterns build borrower confidence.</div></div>
  <div class="card" style="--accent:#3E8E3C"><div class="n">02 — Accessible</div><div class="d">WCAG AA contrast. Keyboard-navigable. 44px touch targets on mobile.</div></div>
  <div class="card" style="--accent:#F2B705"><div class="n">03 — Systematic</div><div class="d">Token-driven color, type, spacing. Composable components on a 4px grid.</div></div>
</div>
</body></html>
