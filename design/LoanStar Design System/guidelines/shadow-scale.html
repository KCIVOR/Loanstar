<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation / Shadow" subtitle="Subtle depth — cards, dropdowns, modals" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;font-family:var(--font-body);background:var(--color-neutral-100);}
.row{display:flex;gap:20px;}
.item{display:flex;flex-direction:column;align-items:center;gap:8px;}
.box{width:64px;height:48px;background:#fff;border-radius:4px;}
.name{font-size:11px;font-weight:600;color:var(--color-neutral-700);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border:1px solid var(--color-neutral-200);"></div><div class="name">none</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs);"></div><div class="name">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm);"></div><div class="name">sm — cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md);"></div><div class="name">md — dropdowns</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg);"></div><div class="name">lg — modals</div></div>
</div>
</body></html>
